# git-cliff configuration for automated changelog generation
# Based on Conventional Commits specification

[changelog]
# changelog header
header = """
# Changelog

All notable changes to this project will be documented in this file.

The format is based on [Keep a Changelog](https://keepachangelog.com/en/1.0.0/),
and this project adheres to [Semantic Versioning](https://semver.org/spec/v2.0.0.html).\n
"""

# template for the changelog body
body = """
{% if version %}\
    ## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | upper }}
    {% for commit in commits
    | filter(attribute="scope")
    | sort(attribute="scope") %}
        - {% if commit.breaking %}[**BREAKING**] {% endif %}**{{ commit.scope }}**: {{ commit.message }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.links[0].href }}))
    {%- endfor %}
    {% raw %}\n{% endraw %}\
    {%- for commit in commits %}
        {%- if not commit.scope %}
        - {% if commit.breaking %}[**BREAKING**] {% endif %}{{ commit.message }} ([`{{ commit.id | truncate(length=7, end="") }}`]({{ commit.links[0].href }}))
        {% endif -%}
    {%- endfor %}
{% endfor %}\n
"""

# template for the changelog footer
footer = """
<!-- generated by git-cliff -->
"""

# remove the leading and trailing whitespace from the templates
trim = true

# postprocessors
postprocessors = [
    { pattern = '\${{ ENV_VAR }}', replace = "---" },
]

[git]
# parse the commits based on https://www.conventionalcommits.org
conventional_commits = true

# filter out the commits that are not conventional
filter_unconventional = true

# regex for parsing the commit messages
commit_parsers = [
    { message = "^feat", group = "Features" },
    { message = "^fix", group = "Bug Fixes" },
    { message = "^doc", group = "Documentation" },
    { message = "^perf", group = "Performance" },
    { message = "^refactor", group = "Refactoring" },
    { message = "^test", group = "Testing" },
    { message = "^chore\\(release\\): prepare for", skip = true },
    { message = "^chore", group = "Miscellaneous Tasks" },
    { body = ".*security", group = "Security" },
    { message = "^revert", group = "Revert" },
]

# protect breaking changes from being skipped due to matching a skipping commit_parser
protect_breaking_commits = false

# filter commits by commit type
filter_commits = false

# regex for skipping tags
skip_tags = "v0.1.0-lch"

# regex for ignoring tags
ignore_tags = ""

# sort the tags topologically
topo_order = false

# sort the commits inside each group by oldest first
sort_commits = "oldest"

# limit the number of commits included in the changelog.
# limit_commits = 42
