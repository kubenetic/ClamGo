run:
  timeout: 10m
  tests: true
  allow-parallel-runners: true
  go: '1.25'

output:
  print-issued-lines: true
  print-linter-name: true

linters:
  enable:
    - errcheck
    - errorlint
    - govet
    - gosec
    - staticcheck

issues:
  exclude:
    - 'declaration of "(err|ctx)" shadows declaration at'
  exclude-dirs:
    - vendor
    - test/fixtures
  exclude-generated: strict
  fix: false
  max-issues-per-linter: 0
  max-same-issues: 0

linters-settings:
  errcheck:
    check-type-assertions: true
    check-blank: true

  govet:
    enable-all: true

  staticcheck:
    checks: ["all"]
