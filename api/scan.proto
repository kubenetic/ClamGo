syntax = "proto3";

package model;

import "google/protobuf/timestamp.proto";
import "google/protobuf/duration.proto";

option go_package = "./pkg/model";

message ScanRequest {
  string jobId = 1;
  uint32 attempts = 2;
  google.protobuf.Timestamp timestamp = 3;

  message File {
    string id = 1;
    string name = 2;
    string sha256 = 3;
    uint64 size = 4;
    string path = 5;
  }

  repeated File files = 4;
}

message ScanResponse {
  string jobId = 1;
  google.protobuf.Timestamp timestamp = 2;
  google.protobuf.Duration elapsed = 3;

  message File {
    string id = 1;
    string name = 2;
    string sha256 = 3;
    uint64 size = 4;
    string verdict = 5;
    string signature = 6;
    google.protobuf.Duration elapsed = 7;
  }

  repeated File files = 6;
}

enum ScanEventStatus {
  FILE_UPLOAD_STARTED = 0;
  FILE_UPLOAD_FINISHED = 1;
  SCAN_STARTED = 2;
  SCAN_ENDED = 3;
  PERSISTING = 4;
  PERSISTED = 5;
  NASTY_STUFF_FOUND = 6;
}

message ScanEvent {
  string jobId = 1;
  google.protobuf.Timestamp timestamp = 2;

  message File {
    string id = 1;
    string name = 2;
    string sha256 = 3;
  }

  File file = 3;
  ScanEventStatus status = 4;
}