name: Build and Publish Docker Image

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

jobs:
  docker-build:
    name: Build Docker Image
    runs-on: ubuntu-latest

    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculate version and build time
        id: version
        run: |
          VERSION=$(git describe --tags --always --dirty 2>/dev/null || echo "dev")
          BUILD_TIME=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "BUILD_TIME=${BUILD_TIME}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/clamgo
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha

      - name: Build and push Docker image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./build/package/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.version.outputs.VERSION }}
            BUILD_TIME=${{ steps.version.outputs.BUILD_TIME }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/clamgo:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/clamgo:buildcache,mode=max

      - name: Image digest
        run: |
          echo "Pushed image digest: ${{ steps.build.outputs.digest }}"

  verify-image:
    name: Verify Docker Image
    needs: docker-build
    runs-on: ubuntu-latest

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Inspect image
        run: |
          # Extract the first tag from the output
          IMAGE_TAG=$(echo "${{ needs.docker-build.outputs.image-tag }}" | head -n 1)
          docker buildx imagetools inspect "$IMAGE_TAG"
          echo "Docker image successfully pushed: $IMAGE_TAG"
        shell: bash

  notify-docker-success:
    name: Docker Build Succeeded
    needs: docker-build
    runs-on: ubuntu-latest
    if: success()
    steps:
      - name: Notify success
        run: echo "Docker image built and pushed successfully"

  notify-docker-failure:
    name: Docker Build Failed
    needs: docker-build
    runs-on: ubuntu-latest
    if: failure()
    steps:
      - name: Notify failure
        run: |
          echo "Docker build and publish failed"
          exit 1
