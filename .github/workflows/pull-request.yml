name: Pull Request Checks

on:
  pull_request:
    branches:
      - master
      - develop
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    name: Validate PR
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache: true

      - name: Validate commit messages
        run: |
          # Check if all commits follow conventional commits format
          echo "Validating commit messages..."
          git log --format=%B origin/master..HEAD | head -1 | grep -E '^(feat|fix|docs|style|refactor|perf|test|chore|revert)(\(.+\))?: .+' || {
            echo "Commit messages must follow conventional commits format"
            echo "Format: <type>(<scope>): <subject>"
            echo "Examples:"
            echo "  feat(api): add new endpoint"
            echo "  fix(scanner): resolve concurrency issue"
            exit 1
          }

      - name: Check for merge conflicts
        run: |
          if grep -r "<<<<<<< HEAD" --include="*.go" --include="*.md" --include="*.yml" .; then
            echo "Merge conflicts detected"
            exit 1
          fi
          echo "No merge conflicts found"

      - name: Run tests
        run: go test -v -race -timeout 5m ./...

      - name: Check for large files
        run: |
          # Warn about large files (>5MB)
          FILES=$(find . -type f -size +5M ! -path './.git/*' ! -path './vendor/*' ! -path './.idea/*')
          if [ -n "$FILES" ]; then
            echo "Large files detected (>5MB):"
            echo "$FILES"
          fi

      - name: Comment PR with checks summary
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `Automated PR checks completed successfully!\n\n**Checks Run:**\n- [x] Code formatting\n- [x] Linting\n- [x] Tests\n- [x] Commit message validation\n- [x] Merge conflict detection`
            });

  docs-check:
    name: Documentation Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for documentation updates
        run: |
          # Suggest documentation updates if code files changed but docs didn't
          if git diff --name-only origin/master...HEAD | grep -E '\.go$' > /dev/null; then
            if ! git diff --name-only origin/master...HEAD | grep -E '\.(md|rst)$|docs/' > /dev/null; then
              echo "Code changes detected but no documentation updates"
              echo "Please consider updating the README or relevant documentation."
            fi
          fi

  size-check:
    name: PR Size Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check PR size
        run: |
          LINES_ADDED=$(git diff --numstat origin/master...HEAD | awk '{sum+=$1} END {print sum}')
          LINES_DELETED=$(git diff --numstat origin/master...HEAD | awk '{sum+=$2} END {print sum}')
          
          echo "PR Statistics:"
          echo "Lines added: $LINES_ADDED"
          echo "Lines deleted: $LINES_DELETED"
          
          if [ "$LINES_ADDED" -gt 1000 ]; then
            echo "Large PR detected (>1000 lines added)"
            echo "Consider breaking this into smaller, more focused PRs for easier review"
          fi
