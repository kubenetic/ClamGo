clamd:
  tcp:
    addr: "localhost:3310"
  unix:
    path: ""

rabbitmq:
  host: "127.0.0.1"
  port: 5672
  username: ""
  password: ""

  # Main exchange
  exchange: "uploader.exchange"

  # Dead-letter exchange (receives permanently failed messages)
  dlx: "uploader.dlx"

  # Queues
  scanQueue: "q.file.scan"
  cancelQueue: "q.case.cancelled"

  # Routing keys for outbound publishes
  scanCompletedRoutingKey: "file.scan.completed"
  scanRetryingRoutingKey: "file.scan.retrying"
  dlqRoutingKey: "file.scan.failed"

  # Consumer QoS
  prefetchCount: 1

redis:
  # Single node configuration (backward compatible, not used when cluster enabled)
  addr: "127.0.0.1:6379"
  password: ""
  db: 0
  
  # Cluster configuration (now supported for high availability)
  cluster:
    enabled: true
    nodes:
      - redis-0:6379
      - redis-1:6379
      - redis-2:6379
    password: ""
    maxRedirects: 10

tempNFS:
  # ClamGo rejects file paths that do not start with this prefix.
  prefix: "/mnt/temp-nfs/"

health:
  port: 8080

logging:
  level: "info"
